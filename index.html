<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>X-O Game</title>
</head>

<body>
    <div class="game-body">
        <div class="game-title">TIC-TAC-TOE</div>
        <div class="game">
            <div class="game-box" data-index="0" onclick="changeToImage()"></div>
            <div class="game-box" data-index="1" onclick="changeToImage()"></div>
            <div class="game-box" data-index="2" onclick="changeToImage()"></div>

            <div class="game-box" data-index="3" onclick="changeToImage()"></div>
            <div class="game-box" data-index="4" onclick="changeToImage()"></div>
            <div class="game-box" data-index="5" onclick="changeToImage()"></div>

            <div class="game-box" data-index="6" onclick="changeToImage()"></div>
            <div class="game-box" data-index="7" onclick="changeToImage()"></div>
            <div class="game-box" data-index="8" onclick="changeToImage()"></div>
        </div>

        <div class="display-current-player">
            <div class="display-title">Points</div>

            <div class="o-player">
                <div class="o-title">O</div>
                <div class="o-points">
                    <input class="o-display" type="text" readonly>
                </div>
            </div>

            <div class="x-player">
                <div class="x-title">X</div>
                <div class="x-points">
                    <input class="x-display" type="text" readonly>
                </div>
            </div>

        </div>
        <div class="winner">
            <div class="winner-title">Winner</div>
            <div class="winner-input">
                <input class="winner-display" type="text" readonly>
            </div>
            <div class="draw">
                <input class="draw-display" type="text" readonly>
            </div>
        </div>
        <div class="reset">
            <button onclick="resetPoints()" class="resetBtn">Reset Points</button>
        </div>
        <div class="reset">
            <button onclick="resetBoard()" class="resetBtn">Reset</button>
        </div>
    </div>
</body>

</html>
